name: Release pipeline (reusable)

# Build + sign + package + attest + publish. Invoked from release-tag.yml and
# release-manual.yml; not directly triggerable. Callers compute version/tag/draft.
#
# Windows-only for now (amd64 + arm64). A macOS job slots in here during the port.

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
        description: 'W.X.Y.Z (no v prefix)'
      tag:
        required: true
        type: string
        description: 'Full tag name including v prefix (e.g. v1.2.3.4)'
      draft:
        required: true
        type: boolean
        description: 'Create the GitHub release as a draft (not published)'

permissions:
  contents: write       # create release + upload assets
  id-token: write       # Azure OIDC for Trusted Signing + sigstore OIDC for attestation
  attestations: write   # write build provenance attestation

jobs:
  build-windows:
    name: Build Windows (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    # Scopes the OIDC token's subject to repo:martona/gig:environment:release-signing;
    # the Azure-side federated credential matches that claim. Create this environment
    # (with the AZURE_* secrets + ARTIFACT_SIGNING_* vars) in the repo settings.
    environment: release-signing
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: windows-latest
            triplet: x64-windows-static
            vcvars_arch: amd64
          - arch: arm64
            runner: windows-11-arm
            triplet: arm64-windows-static
            vcvars_arch: arm64
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Cache vcpkg binaries
        uses: actions/cache@v5
        with:
          path: |
            build/vcpkg-binary-cache
            build/vcpkg-downloads
          key: ${{ runner.os }}-${{ matrix.arch }}-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'vcpkg-ports/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-vcpkg-

      # Build UNSIGNED (the steps below sign with the Trusted Signing action, so
      # build and signing stay separable); stamp the release version into the exe.
      - name: Build Release
        run: .\scripts\build_windows.ps1 -BuildType Release -Triplet ${{ matrix.triplet }} -VcVarsArch ${{ matrix.vcvars_arch }} -Version "${{ inputs.version }}" -DisableCodeSigning

      - name: Verify artifact
        run: |
          $exe = ".\build\windows-release\gig.exe"
          if (-not (Test-Path $exe)) { throw "Missing expected executable: $exe" }
          $vi = [Diagnostics.FileVersionInfo]::GetVersionInfo((Resolve-Path $exe))
          if ($vi.FileVersion -ne "${{ inputs.version }}") {
            throw "exe version '$($vi.FileVersion)' != requested '${{ inputs.version }}'"
          }

      - name: Azure login (Trusted Signing)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign gig.exe
        uses: azure/trusted-signing-action@v0
        with:
          endpoint: ${{ vars.ARTIFACT_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.ARTIFACT_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.ARTIFACT_SIGNING_CERTIFICATE_PROFILE }}
          files-folder: ${{ github.workspace }}\build\windows-release
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify exe signature
        run: |
          $sig = Get-AuthenticodeSignature ".\build\windows-release\gig.exe"
          if ($sig.Status -ne 'Valid') { throw "gig.exe signature is not Valid: $($sig.Status) -- $($sig.StatusMessage)" }
          Write-Host "[+] gig.exe signed by: $($sig.SignerCertificate.Subject)"

      # MSIX runs after gig.exe is signed: the script derives the manifest Publisher
      # from the signed exe. Pack unsigned here (Windows PowerShell -- the logo
      # downscaling uses System.Drawing), then sign the .msix with the same account.
      - name: Package MSIX (unsigned)
        shell: powershell
        run: .\scripts\package_windows_msix.ps1 -Arch ${{ matrix.arch }} -Version "${{ inputs.version }}" -NoSign

      - name: Sign MSIX
        uses: azure/trusted-signing-action@v0
        with:
          endpoint: ${{ vars.ARTIFACT_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.ARTIFACT_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.ARTIFACT_SIGNING_CERTIFICATE_PROFILE }}
          files-folder: ${{ github.workspace }}\build\msix
          files-folder-filter: msix
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify MSIX signature
        run: |
          $msix = ".\build\msix\gig-${{ inputs.version }}-${{ matrix.arch }}.msix"
          $sig = Get-AuthenticodeSignature $msix
          if ($sig.Status -ne 'Valid') { throw "MSIX signature is not Valid: $($sig.Status) ($($sig.StatusMessage))" }
          Write-Host "[+] $msix signed by: $($sig.SignerCertificate.Subject)"

      - name: Stage release artifacts
        run: |
          $ver = "${{ inputs.version }}"
          $arch = "${{ matrix.arch }}"
          $src = ".\build\windows-release"
          $stage = ".\release-stage"
          New-Item -ItemType Directory -Path $stage | Out-Null

          # Installable assets are VERSION-LESS so the README can link stable
          # releases/latest/download/<name> URLs (the redirect needs a constant
          # filename); the version still rides in the exe's VERSIONINFO + the MSIX
          # identity, and the attestation binds by SHA256, not by name.
          $binZip = Join-Path $stage "gig-windows-$arch.zip"
          Compress-Archive -Path "$src\gig.exe" -DestinationPath $binZip
          Write-Host "Created $binZip"

          $msix = ".\build\msix\gig-$ver-$arch.msix"
          if (-not (Test-Path $msix)) { throw "Signed MSIX not found: $msix" }
          Copy-Item $msix (Join-Path $stage "gig-windows-$arch.msix")

          # Symbols stay VERSIONED -- build-tied debugging artifacts, never linked.
          $pdbs = @(Get-ChildItem -Path "$src\*.pdb")
          if ($pdbs.Count -eq 0) { throw "No PDBs found in $src -- symbol shipment is required." }
          $pdbZip = Join-Path $stage "gig-$ver-windows-$arch-symbols.zip"
          Compress-Archive -Path ($pdbs | ForEach-Object { $_.FullName }) -DestinationPath $pdbZip
          Write-Host "Created $pdbZip with $($pdbs.Count) PDB(s)"

          Get-ChildItem $stage | Format-Table Name, Length

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: release-stage/*
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Create release
    needs: [build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: |
          ls -la artifacts/
          echo "Total: $(ls artifacts/ | wc -l) files"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: 'artifacts/*'

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          draft: ${{ inputs.draft }}
          prerelease: false
          generate_release_notes: true
          files: artifacts/*
          fail_on_unmatched_files: true
