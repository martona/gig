name: Release pipeline (reusable)

# Build + sign + package + attest + publish. Invoked from release-tag.yml and
# release-manual.yml; not directly triggerable. Callers compute version/tag/draft.
#
# Windows (amd64 + arm64, Azure Trusted Signing) + macOS (arm64, Developer ID +
# notarization). Both run under the release-signing environment.

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
        description: 'W.X.Y.Z (no v prefix)'
      tag:
        required: true
        type: string
        description: 'Full tag name including v prefix (e.g. v1.2.3.4)'
      draft:
        required: true
        type: boolean
        description: 'Create the GitHub release as a draft (not published)'

permissions:
  contents: write       # create release + upload assets
  id-token: write       # Azure OIDC for Trusted Signing + sigstore OIDC for attestation
  attestations: write   # write build provenance attestation

jobs:
  build-windows:
    name: Build Windows (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    # Scopes the OIDC token's subject to repo:martona/gig:environment:release-signing;
    # the Azure-side federated credential matches that claim. Create this environment
    # (with the AZURE_* secrets + ARTIFACT_SIGNING_* vars) in the repo settings.
    environment: release-signing
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: windows-latest
            triplet: x64-windows-static
            vcvars_arch: amd64
          - arch: arm64
            runner: windows-11-arm
            triplet: arm64-windows-static
            vcvars_arch: arm64
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      # Image version in the key: an image update (new MSVC) rolls the vcpkg
      # ABI hashes and would otherwise leave a stale, unre-savable cache.
      - name: Read runner image version
        id: image
        run: |
          "version=$env:ImageVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Cache vcpkg binaries
        uses: actions/cache@v5
        with:
          path: |
            build/vcpkg-binary-cache
            build/vcpkg-downloads
          key: ${{ runner.os }}-${{ matrix.arch }}-vcpkg-${{ steps.image.outputs.version }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'vcpkg-ports/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-vcpkg-${{ steps.image.outputs.version }}-

      # Build UNSIGNED (the steps below sign with the Trusted Signing action, so
      # build and signing stay separable); stamp the release version into the exe.
      - name: Build Release
        run: .\scripts\build_windows.ps1 -BuildType Release -Triplet ${{ matrix.triplet }} -VcVarsArch ${{ matrix.vcvars_arch }} -Version "${{ inputs.version }}" -DisableCodeSigning

      - name: Verify artifact
        run: |
          $exe = ".\build\windows-release\gig.exe"
          if (-not (Test-Path $exe)) { throw "Missing expected executable: $exe" }
          $vi = [Diagnostics.FileVersionInfo]::GetVersionInfo((Resolve-Path $exe))
          if ($vi.FileVersion -ne "${{ inputs.version }}") {
            throw "exe version '$($vi.FileVersion)' != requested '${{ inputs.version }}'"
          }

      - name: Azure login (Trusted Signing)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign gig.exe
        uses: azure/trusted-signing-action@v0
        with:
          endpoint: ${{ vars.ARTIFACT_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.ARTIFACT_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.ARTIFACT_SIGNING_CERTIFICATE_PROFILE }}
          files-folder: ${{ github.workspace }}\build\windows-release
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify exe signature
        run: |
          $sig = Get-AuthenticodeSignature ".\build\windows-release\gig.exe"
          if ($sig.Status -ne 'Valid') { throw "gig.exe signature is not Valid: $($sig.Status) -- $($sig.StatusMessage)" }
          Write-Host "[+] gig.exe signed by: $($sig.SignerCertificate.Subject)"

      # MSIX runs after gig.exe is signed: the script derives the manifest Publisher
      # from the signed exe. Pack unsigned here (Windows PowerShell -- the logo
      # downscaling uses System.Drawing), then sign the .msix with the same account.
      - name: Package MSIX (unsigned)
        shell: powershell
        run: .\scripts\package_windows_msix.ps1 -Arch ${{ matrix.arch }} -Version "${{ inputs.version }}" -NoSign

      - name: Sign MSIX
        uses: azure/trusted-signing-action@v0
        with:
          endpoint: ${{ vars.ARTIFACT_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.ARTIFACT_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.ARTIFACT_SIGNING_CERTIFICATE_PROFILE }}
          files-folder: ${{ github.workspace }}\build\msix
          files-folder-filter: msix
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify MSIX signature
        run: |
          $msix = ".\build\msix\gig-${{ inputs.version }}-${{ matrix.arch }}.msix"
          $sig = Get-AuthenticodeSignature $msix
          if ($sig.Status -ne 'Valid') { throw "MSIX signature is not Valid: $($sig.Status) ($($sig.StatusMessage))" }
          Write-Host "[+] $msix signed by: $($sig.SignerCertificate.Subject)"

      - name: Stage release artifacts
        run: |
          $ver = "${{ inputs.version }}"
          $arch = "${{ matrix.arch }}"
          $src = ".\build\windows-release"
          $stage = ".\release-stage"
          New-Item -ItemType Directory -Path $stage | Out-Null

          # Installable assets are VERSION-LESS so the README can link stable
          # releases/latest/download/<name> URLs (the redirect needs a constant
          # filename); the version still rides in the exe's VERSIONINFO + the MSIX
          # identity, and the attestation binds by SHA256, not by name.
          $binZip = Join-Path $stage "gig-windows-$arch.zip"
          Compress-Archive -Path "$src\gig.exe" -DestinationPath $binZip
          Write-Host "Created $binZip"

          $msix = ".\build\msix\gig-$ver-$arch.msix"
          if (-not (Test-Path $msix)) { throw "Signed MSIX not found: $msix" }
          Copy-Item $msix (Join-Path $stage "gig-windows-$arch.msix")

          # Symbols stay VERSIONED -- build-tied debugging artifacts, never linked.
          $pdbs = @(Get-ChildItem -Path "$src\*.pdb")
          if ($pdbs.Count -eq 0) { throw "No PDBs found in $src -- symbol shipment is required." }
          $pdbZip = Join-Path $stage "gig-$ver-windows-$arch-symbols.zip"
          Compress-Archive -Path ($pdbs | ForEach-Object { $_.FullName }) -DestinationPath $pdbZip
          Write-Host "Created $pdbZip with $($pdbs.Count) PDB(s)"

          Get-ChildItem $stage | Format-Table Name, Length

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: release-stage/*
          if-no-files-found: error
          retention-days: 1

  build-macos:
    name: Build macOS (arm64)
    runs-on: macos-latest
    # Same release-signing environment as the Windows job, so any protection rules
    # apply uniformly. The Apple secrets/vars below live in that environment.
    environment: release-signing
    env:
      VCPKG_ROOT: ${{ github.workspace }}/v
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg-cache
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/vcpkg-cache,readwrite
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install build dependencies
        run: brew install autoconf autoconf-archive automake libtool ninja

      - name: Read vcpkg baseline
        id: vcpkg-baseline
        run: |
          baseline="$(python3 - <<'PY'
          import json
          with open("vcpkg.json", encoding="utf-8") as manifest_file:
              manifest = json.load(manifest_file)
          print(manifest.get("builtin-baseline", ""))
          PY
          )"
          if [[ -z "$baseline" ]]; then
            echo "vcpkg.json must define builtin-baseline for CI." >&2
            exit 1
          fi
          echo "ref=$baseline" >> "$GITHUB_OUTPUT"

      - name: Checkout vcpkg
        run: |
          git clone --no-tags https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          git -C "$VCPKG_ROOT" checkout --detach "${{ steps.vcpkg-baseline.outputs.ref }}"

      - name: Bootstrap vcpkg
        run: |
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

      - name: Prepare vcpkg binary cache
        run: mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      # Image version in the key: an image update (new Xcode) rolls the vcpkg
      # ABI hashes and would otherwise leave a stale, unre-savable cache.
      - name: Read runner image version
        id: image
        run: echo "version=${ImageVersion:-unknown}" >> "$GITHUB_OUTPUT"

      - name: Cache vcpkg binaries
        uses: actions/cache@v5
        with:
          path: vcpkg-cache
          key: ${{ runner.os }}-${{ runner.arch }}-vcpkg-${{ steps.image.outputs.version }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'vcpkg-ports/**', 'vcpkg-triplets/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-vcpkg-${{ steps.image.outputs.version }}-

      # Imports the Developer ID Application cert into a temporary keychain scoped to
      # this job; the action's post-step removes it on job exit.
      - name: Import code signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_P12_PASSWORD }}
          keychain-password: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}

      - name: Write App Store Connect API key
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          umask 077
          printf '%s' "$APPLE_API_KEY_P8" > "${{ runner.temp }}/authkey.p8"
          # Quick sanity-check: notarytool errors are noisy if the key is missing the
          # PEM markers (e.g. someone double-base64'd it).
          if ! grep -q "BEGIN PRIVATE KEY" "${{ runner.temp }}/authkey.p8"; then
            echo "::error::APPLE_API_KEY_P8 secret doesn't look like a PEM .p8 file"
            exit 1
          fi

      - name: Build Release (signed + notarized)
        env:
          APPLE_CODESIGN_IDENTITY: ${{ vars.APPLE_CODESIGN_IDENTITY }}
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/authkey.p8
          APPLE_API_KEY_ID: ${{ vars.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ vars.APPLE_API_ISSUER_ID }}
        run: bash ./scripts/build_macos.sh --version "${{ inputs.version }}" --notarize

      - name: Verify macOS app bundle
        run: |
          # build_macos.sh outputs build/Release/gig.app (Xcode) or
          # build/macos-release/gig.app (Command Line Tools); find either.
          app="$(find build -name 'gig.app' -type d -print -quit)"
          if [[ -z "$app" || ! -d "$app" ]]; then
            echo "::error::Could not find gig.app under build/"
            find build -print 2>&1 | head -100 >&2 || true
            exit 1
          fi
          echo "Found app bundle at: $app"
          echo "APP_PATH=$app" >> "$GITHUB_ENV"
          for path in \
            "$app/Contents/MacOS/gig" \
            "$app/Contents/Resources/gig.icns" \
            "$app/Contents/Info.plist"
          do
            if [[ ! -e "$path" ]]; then
              echo "Missing expected bundle path: $path" >&2
              exit 1
            fi
          done
          if [[ ! -x "$app/Contents/MacOS/gig" ]]; then
            echo "App executable is not executable: $app/Contents/MacOS/gig" >&2
            exit 1
          fi
          # The notarized ticket must be stapled; fail the release if it isn't.
          xcrun stapler validate "$app"

      - name: Package artifact
        run: |
          mkdir -p release-stage
          # Version-less name so the README can link a stable releases/latest/download
          # URL; the version rides in the bundle's Info.plist and the attestation binds
          # by SHA256. ditto (not zip) preserves macOS metadata + the stapled ticket;
          # --keepParent puts gig.app at the archive root.
          /usr/bin/ditto -c -k --sequesterRsrc --keepParent \
            "$APP_PATH" \
            "release-stage/gig-macos-arm64.zip"
          ls -la release-stage/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: release-stage/*
          if-no-files-found: error
          retention-days: 1

      # The vcpkg port logs live only on the runner; without this a dependency
      # build failure is undiagnosable after the fact.
      - name: Upload vcpkg failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vcpkg-failure-logs-release-macos
          path: |
            v/buildtrees/**/*.log
            build/**/vcpkg-manifest-install.log
          if-no-files-found: ignore
          retention-days: 7

  # ---- App Store uploads --------------------------------------------------
  #
  # Mac App Store (.pkg -> App Store Connect) + iOS (TestFlight), riding the
  # same release: both call the repo's own build scripts with the same env
  # contract they use locally (docs/RELEASING.md "App Store releases"), so CI
  # and a laptop produce the build the same way. Deliberately NOT in publish's
  # `needs`: a store-side hiccup never blocks the GitHub release -- re-run just
  # the failed job. Uploads happen at build time even when the release is a
  # DRAFT; the binary lands in App Store Connect processing, and releasing to
  # the store stays a manual App Store Connect action either way. Until the
  # App Store secrets are configured both jobs skip cleanly with a notice.
  #
  # Runner keychain contents come from ONE p12 (APPLE_APPSTORE_P12) that must
  # bundle every App Store identity + private key:
  #   - Apple Distribution            (iOS export; also usable for MAS app signing)
  #   - Mac Installer Distribution / 3rd Party Mac Developer Installer (the .pkg)
  #   - 3rd Party Mac Developer Application (only if APPLE_CODESIGN_IDENTITY_3RDPARTY
  #     names the legacy cert rather than Apple Distribution)
  #   - Apple Development             (the iOS ARCHIVE signs with automatic dev
  #     signing before the export re-signs manually -- build_ios_appstore.sh's
  #     deliberate signing model)
  # Export them together from Keychain Access (select all -> export as one .p12).

  appstore-macos:
    name: Mac App Store upload
    runs-on: macos-latest
    environment: release-signing
    env:
      GIG_CACHE_DIR: ${{ github.workspace }}/gig-cache
      VCPKG_ROOT: ${{ github.workspace }}/v
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg-cache
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/vcpkg-cache,readwrite
    steps:
      - name: Are the App Store secrets configured?
        id: guard
        env:
          APPLE_APPSTORE_P12: ${{ secrets.APPLE_APPSTORE_P12 }}
          MAS_PROFILE_B64: ${{ secrets.APPLE_MAS_GIG_PROVISIONING_PROFILE_B64 }}
        run: |
          if [[ -n "$APPLE_APPSTORE_P12" && -n "$MAS_PROFILE_B64" ]]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::notice::APPLE_APPSTORE_P12 / APPLE_MAS_GIG_PROVISIONING_PROFILE_B64 not set -- skipping the Mac App Store upload."
          fi

      - name: Checkout
        if: steps.guard.outputs.ok == 'true'
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install build dependencies
        if: steps.guard.outputs.ok == 'true'
        run: brew install autoconf autoconf-archive automake libtool ninja

      - name: Prepare vcpkg (baseline checkout + bootstrap)
        if: steps.guard.outputs.ok == 'true'
        run: |
          baseline="$(python3 - <<'PY'
          import json
          with open("vcpkg.json", encoding="utf-8") as manifest_file:
              manifest = json.load(manifest_file)
          print(manifest.get("builtin-baseline", ""))
          PY
          )"
          if [[ -z "$baseline" ]]; then
            echo "vcpkg.json must define builtin-baseline for CI." >&2
            exit 1
          fi
          git clone --no-tags https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          git -C "$VCPKG_ROOT" checkout --detach "$baseline"
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      # Same key as build-macos on purpose: build_macos_mas.sh uses the same
      # deps + triplet (only post-build signing differs), so the Developer ID
      # job's cache serves this one too. Image version in the key: see there.
      - name: Read runner image version
        if: steps.guard.outputs.ok == 'true'
        id: image
        run: echo "version=${ImageVersion:-unknown}" >> "$GITHUB_OUTPUT"

      - name: Cache vcpkg binaries
        if: steps.guard.outputs.ok == 'true'
        uses: actions/cache@v5
        with:
          path: vcpkg-cache
          key: ${{ runner.os }}-${{ runner.arch }}-vcpkg-${{ steps.image.outputs.version }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'vcpkg-ports/**', 'vcpkg-triplets/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-vcpkg-${{ steps.image.outputs.version }}-

      - name: Import App Store signing certificates
        if: steps.guard.outputs.ok == 'true'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_APPSTORE_P12 }}
          p12-password: ${{ secrets.APPLE_APPSTORE_P12_PASSWORD }}
          keychain-password: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}

      - name: Write App Store Connect API key + provisioning profile
        if: steps.guard.outputs.ok == 'true'
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          MAS_PROFILE_B64: ${{ secrets.APPLE_MAS_GIG_PROVISIONING_PROFILE_B64 }}
        run: |
          umask 077
          printf '%s' "$APPLE_API_KEY_P8" > "${{ runner.temp }}/authkey.p8"
          if ! grep -q "BEGIN PRIVATE KEY" "${{ runner.temp }}/authkey.p8"; then
            echo "::error::APPLE_API_KEY_P8 secret doesn't look like a PEM .p8 file"
            exit 1
          fi
          printf '%s' "$MAS_PROFILE_B64" | base64 --decode > "${{ runner.temp }}/gig-mas.provisionprofile"
          # Profiles are CMS blobs; a failed decode here beats ITMS errors later.
          security cms -D -i "${{ runner.temp }}/gig-mas.provisionprofile" > /dev/null

      - name: Build, sign, package, upload (Mac App Store)
        if: steps.guard.outputs.ok == 'true'
        env:
          APPLE_CODESIGN_IDENTITY_3RDPARTY: ${{ vars.APPLE_CODESIGN_IDENTITY_3RDPARTY }}
          APPLE_CODESIGN_INSTALLER_IDENTITY_3RDPARTY: ${{ vars.APPLE_CODESIGN_INSTALLER_IDENTITY_3RDPARTY }}
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
          APPLE_MAS_GIG_PROVISIONING_PROFILE: ${{ runner.temp }}/gig-mas.provisionprofile
          APPLE_API_KEY_PATH: ${{ runner.temp }}/authkey.p8
          APPLE_API_KEY_ID: ${{ vars.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ vars.APPLE_API_ISSUER_ID }}
        run: bash ./scripts/build_macos_mas.sh --version "${{ inputs.version }}" --upload

      - name: Upload vcpkg failure logs
        if: failure() && steps.guard.outputs.ok == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: vcpkg-failure-logs-appstore-macos
          path: |
            v/buildtrees/**/*.log
            build/**/vcpkg-manifest-install.log
          if-no-files-found: ignore
          retention-days: 7

  appstore-ios:
    name: iOS App Store upload
    runs-on: macos-latest
    environment: release-signing
    env:
      GIG_CACHE_DIR: ${{ github.workspace }}/gig-cache
      VCPKG_ROOT: ${{ github.workspace }}/v
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg-cache
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/vcpkg-cache,readwrite
    steps:
      - name: Are the App Store secrets configured?
        id: guard
        env:
          APPLE_APPSTORE_P12: ${{ secrets.APPLE_APPSTORE_P12 }}
          IOS_PROFILE_B64: ${{ secrets.APPLE_IOS_GIG_PROVISIONING_PROFILE_B64 }}
        run: |
          if [[ -n "$APPLE_APPSTORE_P12" && -n "$IOS_PROFILE_B64" ]]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::notice::APPLE_APPSTORE_P12 / APPLE_IOS_GIG_PROVISIONING_PROFILE_B64 not set -- skipping the iOS App Store upload."
          fi

      - name: Checkout
        if: steps.guard.outputs.ok == 'true'
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install build dependencies
        if: steps.guard.outputs.ok == 'true'
        run: brew install autoconf autoconf-archive automake libtool

      - name: Prepare vcpkg (baseline checkout + bootstrap)
        if: steps.guard.outputs.ok == 'true'
        run: |
          baseline="$(python3 - <<'PY'
          import json
          with open("vcpkg.json", encoding="utf-8") as manifest_file:
              manifest = json.load(manifest_file)
          print(manifest.get("builtin-baseline", ""))
          PY
          )"
          if [[ -z "$baseline" ]]; then
            echo "vcpkg.json must define builtin-baseline for CI." >&2
            exit 1
          fi
          git clone --no-tags https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          git -C "$VCPKG_ROOT" checkout --detach "$baseline"
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      # DEVICE triplet (arm64-ios), distinct from ios-ci.yml's simulator cache.
      # Image version in the key: see build-macos.
      - name: Read runner image version
        if: steps.guard.outputs.ok == 'true'
        id: image
        run: echo "version=${ImageVersion:-unknown}" >> "$GITHUB_OUTPUT"

      - name: Cache vcpkg binaries
        if: steps.guard.outputs.ok == 'true'
        uses: actions/cache@v5
        with:
          path: vcpkg-cache
          key: ${{ runner.os }}-${{ runner.arch }}-vcpkg-ios-device-${{ steps.image.outputs.version }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'vcpkg-ports/**', 'vcpkg-triplets/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-vcpkg-ios-device-${{ steps.image.outputs.version }}-

      - name: Import App Store signing certificates
        if: steps.guard.outputs.ok == 'true'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_APPSTORE_P12 }}
          p12-password: ${{ secrets.APPLE_APPSTORE_P12_PASSWORD }}
          keychain-password: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}

      - name: Write App Store Connect API key + provisioning profile
        if: steps.guard.outputs.ok == 'true'
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          IOS_PROFILE_B64: ${{ secrets.APPLE_IOS_GIG_PROVISIONING_PROFILE_B64 }}
        run: |
          umask 077
          printf '%s' "$APPLE_API_KEY_P8" > "${{ runner.temp }}/authkey.p8"
          if ! grep -q "BEGIN PRIVATE KEY" "${{ runner.temp }}/authkey.p8"; then
            echo "::error::APPLE_API_KEY_P8 secret doesn't look like a PEM .p8 file"
            exit 1
          fi
          printf '%s' "$IOS_PROFILE_B64" | base64 --decode > "${{ runner.temp }}/gig-ios.mobileprovision"
          security cms -D -i "${{ runner.temp }}/gig-ios.mobileprovision" > /dev/null

      - name: Archive, export, upload (iOS App Store)
        if: steps.guard.outputs.ok == 'true'
        env:
          APPLE_IOS_GIG_PROVISIONING_PROFILE: ${{ runner.temp }}/gig-ios.mobileprovision
          APPLE_CODESIGN_IDENTITY_IOS: ${{ vars.APPLE_CODESIGN_IDENTITY_IOS }}
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/authkey.p8
          APPLE_API_KEY_ID: ${{ vars.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ vars.APPLE_API_ISSUER_ID }}
        run: bash ./scripts/build_ios_appstore.sh --version "${{ inputs.version }}" --upload

      - name: Upload vcpkg failure logs
        if: failure() && steps.guard.outputs.ok == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: vcpkg-failure-logs-appstore-ios
          path: |
            v/buildtrees/**/*.log
            build/**/vcpkg-manifest-install.log
          if-no-files-found: ignore
          retention-days: 7

  publish:
    name: Create release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # One combined SHA256SUMS.txt over every asset: lets users verify downloads and
      # lets the Homebrew tap bump read the cask's sha256 from this file instead of
      # re-downloading the zip (mirrors ../yo). Computed before attest so it's covered
      # by provenance, and shipped as a release asset.
      - name: Checksums
        run: |
          python3 - <<'PY'
          import hashlib
          from pathlib import Path

          root = Path("artifacts")
          lines = []
          for path in sorted(p for p in root.iterdir() if p.is_file() and p.name != "SHA256SUMS.txt"):
              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              lines.append(f"{digest}  {path.name}")
          (root / "SHA256SUMS.txt").write_text("\n".join(lines) + "\n", encoding="ascii")
          print((root / "SHA256SUMS.txt").read_text(encoding="ascii"), end="")
          PY
          ls -la artifacts/

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: 'artifacts/*'

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          draft: ${{ inputs.draft }}
          prerelease: false
          generate_release_notes: true
          files: artifacts/*
          fail_on_unmatched_files: true

      - name: Trigger Homebrew bump (direct publishes only)
        # A `publish: true` release is published by this run's GITHUB_TOKEN, so GitHub's
        # loop guard emits no `release` event that can start a workflow -- the tap's
        # homebrew-tap.yml `release: [published]` trigger never sees it. Dispatch the bump
        # straight to the tap here (the same call homebrew-tap.yml makes). Drafts skip
        # this: a human publishes them later, which DOES emit `release: published`.
        if: ${{ inputs.draft == false }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          if [[ -z "$GH_TOKEN" ]]; then
            echo "::notice::HOMEBREW_TAP_TOKEN not set -- skipping Homebrew bump."
            exit 0
          fi
          curl --fail-with-body -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/martona/homebrew-tap/dispatches \
            -d "{\"event_type\":\"bump-homebrew-package\",\"client_payload\":{\"target\":\"gig\",\"tag\":\"$RELEASE_TAG\"}}"
