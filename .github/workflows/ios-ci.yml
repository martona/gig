name: iOS CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: iOS simulator build test (arm64)
    runs-on: macos-latest

    env:
      GIG_CACHE_DIR: ${{ github.workspace }}/gig-cache
      VCPKG_ROOT: ${{ github.workspace }}/v
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg-cache
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/vcpkg-cache,readwrite

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Verify Apple Silicon runner
        run: |
          if [[ "$(uname -m)" != "arm64" ]]; then
            echo "iOS CI builds the arm64 simulator slice only; needs an Apple Silicon runner." >&2
            exit 1
          fi

      # FFmpeg (+ deps) is cross-compiled for iOS from the overlay port via vcpkg;
      # that needs autotools. The Xcode project (ios/gig.xcodeproj) is committed.
      - name: Install build dependencies
        run: brew install autoconf autoconf-archive automake libtool

      - name: Read vcpkg baseline
        id: vcpkg-baseline
        run: |
          baseline="$(python3 - <<'PY'
          import json
          with open("vcpkg.json", encoding="utf-8") as manifest_file:
              manifest = json.load(manifest_file)
          print(manifest.get("builtin-baseline", ""))
          PY
          )"
          if [[ -z "$baseline" ]]; then
            echo "vcpkg.json must define builtin-baseline for CI." >&2
            exit 1
          fi
          echo "ref=$baseline" >> "$GITHUB_OUTPUT"

      # Pre-clone at the manifest baseline so setup_ios_vcpkg.sh reuses this
      # VCPKG_ROOT (it only clones when absent) and the binary cache is cacheable.
      - name: Checkout vcpkg
        run: |
          git clone --no-tags https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          git -C "$VCPKG_ROOT" checkout --detach "${{ steps.vcpkg-baseline.outputs.ref }}"

      - name: Bootstrap vcpkg
        run: |
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

      - name: Prepare vcpkg binary cache
        run: mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      # The expensive part is FFmpeg (+ deps) cross-compiled for arm64-ios-simulator;
      # persist the binary cache so only a manifest / overlay / triplet change re-pays it.
      # Image version in the key: an image update rolls the vcpkg ABI hashes
      # and would otherwise leave a stale, unre-savable cache (see macos-ci.yml).
      - name: Read runner image version
        id: image
        run: echo "version=${ImageVersion:-unknown}" >> "$GITHUB_OUTPUT"

      - name: Cache vcpkg binaries
        uses: actions/cache@v5
        with:
          path: vcpkg-cache
          key: ${{ runner.os }}-${{ runner.arch }}-vcpkg-ios-simulator-${{ steps.image.outputs.version }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'vcpkg-ports/**', 'vcpkg-triplets/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-vcpkg-ios-simulator-${{ steps.image.outputs.version }}-

      # The feasibility gate: prove Boost/OpenSSL/FFmpeg cross-compile for iOS.
      - name: Install iOS vcpkg dependencies (feasibility gate)
        run: bash ./scripts/setup_ios_vcpkg.sh --simulator-only

      # Deps are already installed above; generate + build the app (proves the
      # bridge + core link against the vcpkg static libs).
      - name: Build iOS simulator app
        run: bash ./scripts/build_ios.sh --skip-vcpkg --disable-code-signing

      - name: Verify iOS app bundle
        run: |
          app="$(find build/ios -name 'gig.app' -type d -print -quit)"
          if [[ -z "$app" ]]; then
            echo "Could not find gig.app under build/ios." >&2
            find build/ios -print | sed -n '1,200p'
            exit 1
          fi

          echo "Verifying app bundle: $app"
          find "$app" -maxdepth 2 -print | sed -n '1,160p'

          for path in \
            "$app/gig" \
            "$app/Info.plist"
          do
            if [[ ! -e "$path" ]]; then
              echo "Missing expected bundle path: $path" >&2
              exit 1
            fi
          done

          if [[ ! -x "$app/gig" ]]; then
            echo "App executable is not executable: $app/gig" >&2
            ls -l "$app"
            exit 1
          fi

      - name: Upload vcpkg failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vcpkg-failure-logs-ios-ci
          path: |
            v/buildtrees/**/*.log
            build/**/vcpkg-manifest-install.log
          if-no-files-found: ignore
          retention-days: 7
